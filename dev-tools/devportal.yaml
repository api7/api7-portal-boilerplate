apiVersion: v1
kind: Secret
metadata:
  name: developer-portal-token
  namespace: api7
type: Opaque
stringData:
  token: ${PORTAL_TOKEN}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-portal-config
  namespace: api7
data:
  config.yaml: |
    db:
      url: postgres://api7ee:changeme@api7-postgresql:5432/api7ee
    auth:
      secret: "e2e-auth-secret-key-for-testing-min-32-chars"
    portal:
      url: "http://api7ee-e2e-developer-portal:4321"
      token: ${DEV_PORTAL_TOKEN}
    app:
      baseURL: "http://localhost:3001"
      trustedOrigins:
        - "http://localhost:3001"
      beforeSignUpButtonHtml: >-
        <p>By continuing, you acknowledge Example's <a href="https://example.com/terms" target="_blank" rel="noopener noreferrer">Terms of use</a> and the <a href="https://example.com/privacy" target="_blank" rel="noopener noreferrer">Privacy policy</a>.</p>
---
apiVersion: v1
kind: Service
metadata:
  name: developer-portal
  namespace: api7
  labels:
    app: developer-portal
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: developer-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-portal
  namespace: api7
  labels:
    app: developer-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: developer-portal
  template:
    metadata:
      labels:
        app: developer-portal
    spec:
      containers:
        - name: developer-portal
          image: api7-ee-developer-portal-e2e:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: DEV_PORTAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: developer-portal-token
                  key: token
          volumeMounts:
            - name: config
              mountPath: /app/apps/site/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: developer-portal-config
