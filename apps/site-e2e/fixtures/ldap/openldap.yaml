apiVersion: v1
kind: ConfigMap
metadata:
  name: api7ee3-openldap
data:
  tree.ldif: |
    # Root creation
    dn: dc=example,dc=org
    objectClass: dcObject
    objectClass: organization
    dc: example
    o: example

    dn: ou=users,dc=example,dc=org
    objectClass: organizationalUnit
    ou: users

    # User user1 creation
    dn: cn=user1,ou=users,dc=example,dc=org
    cn: User1
    sn: Bar1
    mail: user1@example.com
    objectClass: inetOrgPerson
    objectClass: posixAccount
    objectClass: shadowAccount
    userPassword: password1
    uid: user1
    uidNumber: 1000
    gidNumber: 1000
    homeDirectory: /home/user1

    # User user2 creation
    dn: cn=user2,ou=users,dc=example,dc=org
    cn: User2
    sn: Bar2
    mail: user2@example.com
    objectClass: inetOrgPerson
    objectClass: posixAccount
    objectClass: shadowAccount
    userPassword: password2
    uid: user2
    uidNumber: 1001
    gidNumber: 1001
    homeDirectory: /home/user2

    # Admin user creation
    dn: cn=admin,ou=users,dc=example,dc=org
    cn: Admin
    sn: Admin
    mail: admin@example.com
    objectClass: inetOrgPerson
    objectClass: posixAccount
    objectClass: shadowAccount
    userPassword: admin
    uid: admin
    uidNumber: 1002
    gidNumber: 1002
    homeDirectory: /home/admin

    # Group creation
    dn: cn=readers,ou=users,dc=example,dc=org
    cn: readers
    objectClass: groupOfNames
    # User group membership
    member: cn=user1,ou=users,dc=example,dc=org
    member: cn=user2,ou=users,dc=example,dc=org
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  labels:
    app.kubernetes.io/name: openldap
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openldap
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openldap
    spec:
      containers:
        - name: openldap
          image: docker.io/bitnamilegacy/openldap:2.6.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp-ldap
              containerPort: 1389
            - name: tcp-ldaps
              containerPort: 1636
          env:
            - name: LDAP_ADMIN_USERNAME
              value: "admin"
            - name: LDAP_ADMIN_PASSWORD
              value: "admin"
            - name: LDAP_CUSTOM_LDIF_DIR
              value: /bitnamilegacy/openldap/ldif/custom
            - name: LDAP_ENABLE_TLS
              value: "yes"
            - name: LDAP_TLS_CERT_FILE
              value: "/opt/bitnamilegacy/openldap/certs/ldapserver.crt"
            - name: LDAP_TLS_KEY_FILE
              value: "/opt/bitnamilegacy/openldap/certs/ldapserver.key"
            - name: LDAP_TLS_CA_FILE
              value: "/opt/bitnamilegacy/openldap/certs/ldapCA.crt"
            - name: LDAP_TLS_VERIFY_CLIENTS
              value: "try"
          volumeMounts:
            - name: ldif-config
              mountPath: /bitnamilegacy/openldap/ldif/custom
            - name: openldap-certs
              mountPath: /opt/bitnamilegacy/openldap/certs
      volumes:
        - name: ldif-config
          configMap:
            name: api7ee3-openldap
        - name: openldap-certs
          secret:
            secretName: openldap-certs
---
apiVersion: v1
kind: Service
metadata:
  name: openldap
  labels:
    app.kubernetes.io/name: openldap
spec:
  type: ClusterIP
  ports:
    - name: tcp-ldap
      port: 1389
      targetPort: 1389
    - name: tcp-ldaps
      port: 1636
      targetPort: 1636
  selector:
    app.kubernetes.io/name: openldap
