apiVersion: apps/v1
kind: Deployment
metadata:
  name: cas-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cas-server
  template:
    metadata:
      labels:
        app: cas-server
    spec:
      containers:
        - name: cas-server
          image: apereo/cas:7.2.0
          ports:
            - name: http
              containerPort: 8089
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: cas-config
              mountPath: /etc/cas/config
            - name: cas-services
              mountPath: /etc/cas/services
          readinessProbe:
            httpGet:
              path: /cas/login
              port: 8089
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /cas/login
              port: 8089
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 5
      volumes:
        - name: cas-config
          configMap:
            name: cas-config
        - name: cas-services
          configMap:
            name: cas-services
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cas-config
data:
  cas.properties: |
    cas.server.name=http://cas-server:8089
    cas.server.prefix=${cas.server.name}/cas

    cas.service-registry.json.location=file:/etc/cas/services
    cas.service-registry.json.watcher-enabled=true
    cas.service-registry.core.init-from-json=true

    cas.tgc.secure=false
    cas.tgc.same-site-policy=Lax
    cas.tgc.path=/
    server.ssl.enabled=false
    cas.logout.follow-service-redirects=true

    server.address=0.0.0.0
    server.port=8089
    cas.ticket.st.timeToKillInSeconds=200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cas-services
data:
  API7-10000001.json: |
    {
      "@class": "org.apereo.cas.services.CasRegisteredService",
      "serviceId": "^https?://.*",
      "name": "API7Dashboard",
      "id": 10000001,
      "evaluationOrder": 10000,
      "accessStrategy": {
        "@class": "org.apereo.cas.services.DefaultRegisteredServiceAccessStrategy",
        "enabled": true,
        "ssoEnabled": true
      },
      "attributeReleasePolicy": {
        "@class": "org.apereo.cas.services.ReturnMappedAttributeReleasePolicy",
        "allowedAttributes": {
          "@class": "java.util.HashMap",
          "username": "username",
          "name": "name",
          "email": "email"
        }
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: cas-server
spec:
  ports:
    - name: http
      port: 8089
      targetPort: 8089
    - name: https
      port: 8443
      targetPort: 8443
  selector:
    app: cas-server