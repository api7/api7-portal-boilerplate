apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp4dev
  labels:
    app: smtp4dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtp4dev
  template:
    metadata:
      labels:
        app: smtp4dev
    spec:
      containers:
        - name: smtp4dev
          image: rnwood/smtp4dev:v3
          ports:
            - containerPort: 80 # Web
            - containerPort: 25 # SMTP
            - containerPort: 143 # IMAP
          env:
            - name: ServerOptions__Urls
              value: 'http://*:80'
            - name: ServerOptions__HostName
              value: 'smtp4dev'
            - name: ServerOptions__SmtpEnabledAuthTypesWhenSecureConnection
              value: '[]'
            - name: ServerOptions__SmtpEnabledAuthTypesWhenNotSecureConnection
              value: '[]'
            - name: ServerOptions__SecureConnectionRequired
              value: 'false'
---
apiVersion: v1
kind: Service
metadata:
  name: smtp4dev
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: smtp
      port: 25
      targetPort: 25
    - name: imap
      port: 143
      targetPort: 143
  selector:
    app: smtp4dev
